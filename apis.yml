description: >-
  DNV is a global classification, certification, and assurance provider for the
  maritime, energy, and industrial sectors. The API portfolio includes the Class
  Status API for vessel classification data, the Veracity industry data platform,
  and the public Vessel Register, supporting fleet management, regulatory compliance,
  and operational analytics workflows.
